name: Release Android SDK

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      version:
        required: false
        type: string
    outputs:
      checksum:
        description: "SHA256 checksum of moqkit-{version}.aar"
        value: ${{ jobs.build.outputs.checksum }}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
    outputs:
      checksum: ${{ steps.checksum.outputs.checksum }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$INPUT_TAG"
            VERSION="${VERSION#android/v}"
            VERSION="${VERSION#v}"
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::Release version is empty"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build AAR
        run: |
          cd android/moqkit
          chmod +x gradlew
          ./gradlew :moqkit:assembleRelease

      - name: Rename AAR and compute checksum
        id: checksum
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          AAR_SRC="android/moqkit/moqkit/build/outputs/aar/moqkit-release.aar"
          AAR_DST="moqkit-${VERSION}.aar"
          cp "$AAR_SRC" "$AAR_DST"
          CHECKSUM=$(sha256sum "$AAR_DST" | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "Checksum: $CHECKSUM"

      - name: Upload AAR to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: moqkit-${{ steps.version.outputs.version }}.aar

      - name: Publish to Maven Central
        if: env.MAVEN_CENTRAL_USERNAME != ''
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          cd android/moqkit
          ./gradlew :moqkit:publishToMavenCentral \
            -PpublishVersion=${{ steps.version.outputs.version }}
