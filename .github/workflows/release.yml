name: Release

on:
  push:
    tags:
      - "ios/v*"
      - "android/v*"

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.release.outputs.platform }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Parse release tag
        id: release
        env:
          TAG: ${{ github.ref_name }}
        run: |
          case "$TAG" in
            ios/v*)
              PLATFORM="ios"
              VERSION="${TAG#ios/v}"
              ;;
            android/v*)
              PLATFORM="android"
              VERSION="${TAG#android/v}"
              ;;
            *)
              echo "::error::Release tags must start with ios/v or android/v"
              exit 1
              ;;
          esac

          if [ -z "$VERSION" ]; then
            echo "::error::Release version is empty"
            exit 1
          fi

          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  create-release:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ needs.metadata.outputs.platform == 'ios' && format('iOS v{0}', needs.metadata.outputs.version) || format('Android v{0}', needs.metadata.outputs.version) }}
          generate_release_notes: true

  ios:
    needs: [metadata, create-release]
    if: needs.metadata.outputs.platform == 'ios'
    uses: ./.github/workflows/release-ios.yml
    secrets: inherit
    with:
      tag: ${{ github.ref_name }}

  android:
    needs: [metadata, create-release]
    if: needs.metadata.outputs.platform == 'android'
    uses: ./.github/workflows/release-android.yml
    secrets: inherit
    with:
      tag: ${{ github.ref_name }}
      version: ${{ needs.metadata.outputs.version }}

  finalize:
    needs: [metadata, ios]
    if: needs.metadata.outputs.platform == 'ios'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update Package.swift (iOS binary target)
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          CHECKSUM: ${{ needs.ios.outputs.checksum }}
        run: |
          python3 - <<'EOF'
          import re, os

          repo = os.environ["REPO"]
          tag = os.environ["TAG"]
          url = f"https://github.com/{repo}/releases/download/{tag}/moqffi.xcframework.zip"
          checksum = os.environ["CHECKSUM"]

          with open("Package.swift") as f:
              content = f.read()

          new_target = (
              '.binaryTarget(\n'
              '            name: "moqFFI",\n'
              f'            url: "{url}",\n'
              f'            checksum: "{checksum}"\n'
              '        )'
          )

          content = re.sub(
              r'\.binaryTarget\(\s*name:\s*"moqFFI"[^)]*\)',
              new_target,
              content,
              flags=re.DOTALL,
          )

          with open("Package.swift", "w") as f:
              f.write(content)

          print("Updated Package.swift")
          EOF

      - name: Commit, retag, and push
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "chore: release iOS v$VERSION - update binary target checksum"
          git tag -f "$TAG"
          git push origin HEAD:main
          git push origin "refs/tags/$TAG" --force
