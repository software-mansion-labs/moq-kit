name: Release iOS SDK

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Swift package
        run: |
          SDK="$(xcrun --sdk iphonesimulator --show-sdk-path)"
          swift build \
            --package-path "$GITHUB_WORKSPACE" \
            --sdk "$SDK" \
            --triple arm64-apple-ios16.0-simulator
