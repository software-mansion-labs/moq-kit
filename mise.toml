# Project task implementations live in ./mise-tasks.

[tasks."android:build"]
description = "Build Android FFI artifacts and assemble the MoQKit AAR"
file = "mise-tasks/android/build"

[tasks."android:ffi"]
description = "Build Rust moq-ffi for Android and generate Kotlin UniFFI/JNI artifacts"
file = "mise-tasks/android/ffi"

[tasks."android:install"]
description = "Install the Android demo debug APK on a connected device"
file = "mise-tasks/android/install"

[tasks."android:launch"]
description = "Launch the installed Android demo on a connected device"
file = "mise-tasks/android/launch"

[tasks."android:publish"]
description = "Build Android FFI artifacts and publish the MoQKit AAR to Maven Central"
file = "mise-tasks/android/publish"

[tasks."android:publish-local"]
description = "Build Android artifacts and publish the MoQKit AAR to local Maven"
file = "mise-tasks/android/publish-local"

[tasks."android:run"]
description = "Build, install, and launch the Android demo on a connected device"
file = "mise-tasks/android/run"

[tasks."docs:all"]
description = "Build both iOS DocC and Android Dokka documentation"
file = "mise-tasks/docs/all"

[tasks."docs:android"]
description = "Build Android Dokka documentation for the MoQKit Android SDK"
file = "mise-tasks/docs/android"

[tasks."docs:ios"]
description = "Build iOS DocC documentation into docs/ios, or preview it locally"
file = "mise-tasks/docs/ios"

[tasks."ios:ffi"]
description = "Build Rust moq-ffi, generate Swift UniFFI bindings, and create the iOS XCFramework"
file = "mise-tasks/ios/ffi"

[tasks."ios:build"]
description = "Build iOS FFI artifacts, then compile the MoQKit Swift package for the iOS simulator"
file = "mise-tasks/ios/build"

[tasks."ios:run"]
description = "Build, install, and launch the iOS MoQ Demo on a connected device or simulator"
file = "mise-tasks/ios/run"

[tasks."media:to-fmp4"]
description = "Convert a source video to CMAF fragmented MP4 for MOQ publishing"
file = "mise-tasks/media/to-fmp4"

[tasks."relay:run"]
description = "Run the local moq-lite relay from vendor/moq"
file = "mise-tasks/relay/run"

[tasks."rust:check"]
description = "Run Rust checks, tests, and linting in vendor/moq"
file = "mise-tasks/rust/check"

[tasks."rust:fix"]
description = "Auto-format and fix Rust code in vendor/moq"
file = "mise-tasks/rust/fix"

[tasks."stream:obs"]
description = "Use obs-cmd to switch OBS to a profile, start a MOQ stream, and monitor it until stopped"
file = "mise-tasks/stream/obs"

[tasks."stream:file"]
description = "Loop one or more CMAF fragmented MP4 file streams to a MOQ relay"
file = "mise-tasks/stream/file"
