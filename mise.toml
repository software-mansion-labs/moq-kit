[tasks."rust:check"]
description = "Run tests + linting in vendor/moq"
run = "cd vendor/moq && just check"

[tasks."rust:fix"]
description = "Auto-format Rust code in vendor/moq"
run = "cd vendor/moq && just fix"

[tasks."android:publish-local"]
description = "Assemble AAR and publish to local Maven (~/.m2)"
run = "cd android/moqkit && ./gradlew :MoQKit:build && ./gradlew :MoQKit:publishToMavenLocal"

[tasks."android:install"]
description = "Install Android demo APK"
run = "cd examples/android/demo/MoQDemo && ./gradlew installDebug"

[tasks."android:launch"]
description = "Launch Android demo"
run = "adb shell am start -n com.swmansion.moqdemo/.MainActivity"

[tasks."android:build"]
description = "Build Rust + UniFFI + .so + Kotlin bindings + AAR"
run = "cd android/moqkit && ./gradlew :MoQKit:build"

[tasks."android:publish"]
description = "Build Rust + AAR and publish to Maven Central"
run = "mise run publish-android"

[tasks."relay"]
description = "Run a relay server"
run = "cd vendor/moq && just relay"
